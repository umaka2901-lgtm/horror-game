<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПОСЛЕДНИЙ СИГНАЛ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --red: #8b0000;
    --dim-red: #3a0000;
    --pale: #c8b8a2;
    --flicker: #e8d5b0;
    --static: #0d0d0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--static);
    color: var(--pale);
    font-family: 'Spectral', serif;
    overflow: hidden;
    cursor: crosshair;
  }

  /* scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    pointer-events: none; z-index: 9999;
  }
  /* vignette */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.92) 100%);
    pointer-events: none; z-index: 9998;
  }

  /* ── BG CANVAS (atmospheric illustrations) ── */
  #bg-canvas {
    position: fixed; inset: 0;
    z-index: 2;
    opacity: 0;
    transition: opacity 2s ease;
  }
  #bg-canvas.show { opacity: 1; }

  /* ── NOISE ── */
  #noise {
    position: fixed; inset: 0;
    z-index: 3; pointer-events: none; opacity: 0.04;
  }

  /* ── OVERLAYS ── */
  #flash {
    position: fixed; inset: 0; background: var(--red);
    opacity: 0; pointer-events: none; z-index: 9997; transition: opacity 0.08s;
  }
  #flash.on { opacity: 0.2; }

  #static-burst {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, transparent 1px, transparent 3px, rgba(255,255,255,0.02) 4px);
    opacity: 0; pointer-events: none; z-index: 9996; transition: opacity 0.04s;
  }
  #static-burst.on { opacity: 1; }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 1.2rem; right: 1.5rem; z-index: 20;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem; color: #3a2a1a; letter-spacing: 0.12em;
    text-align: right; line-height: 2;
  }
  #deaths-log {
    position: fixed; bottom: 1.2rem; right: 1.5rem; z-index: 20;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem; color: #3a2a1a; letter-spacing: 0.1em; text-align: right;
  }
  #save-indicator {
    position: fixed; bottom: 1.2rem; left: 1.5rem; z-index: 20;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem; color: #3a2a1a; letter-spacing: 0.15em;
    opacity: 0; transition: opacity 1s;
  }
  #save-indicator.show { opacity: 1; }

  /* ── SOUND TOGGLE ── */
  #sound-btn {
    position: fixed; top: 1.2rem; left: 1.5rem; z-index: 20;
    background: transparent; border: none; cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem; color: #3a2a1a; letter-spacing: 0.15em;
    transition: color 0.3s;
  }
  #sound-btn:hover { color: #8b4a2a; }

  /* ── GAME CONTAINER ── */
  #game {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem; overflow-y: auto;
  }
  #screen { width: 100%; max-width: 660px; position: relative; }

  /* ── TITLE ── */
  .title-wrap { text-align: center; animation: fadein 3s ease forwards; }
  .title-wrap h1 {
    font-family: 'Spectral', serif; font-weight: 600;
    font-size: clamp(1.8rem, 5vw, 3rem); letter-spacing: 0.18em;
    color: var(--flicker);
    text-shadow: 0 0 30px rgba(200,150,80,0.5), 0 0 60px rgba(139,0,0,0.4);
    animation: flicker 7s infinite; margin-bottom: 0.4rem;
  }
  .title-sub {
    font-family: 'Share Tech Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.2em; color: var(--dim-red); text-transform: uppercase; margin-bottom: 2.8rem;
  }
  .title-epigraph {
    font-style: italic; font-size: 1rem; color: #6a5a45;
    margin-bottom: 2.8rem; line-height: 1.7; max-width: 420px; margin-left: auto; margin-right: auto;
  }

  /* ── SCENE ── */
  .scene-wrap { animation: fadein 1.6s ease forwards; }
  .loc-tag {
    font-family: 'Share Tech Mono', monospace; font-size: 0.56rem;
    letter-spacing: 0.18em; color: var(--red); text-transform: uppercase;
    margin-bottom: 1.2rem; opacity: 0.7;
  }
  .cond-bar {
    font-family: 'Share Tech Mono', monospace; font-size: 0.56rem;
    letter-spacing: 0.15em; color: #3a2a18;
    display: flex; gap: 1.4rem; flex-wrap: wrap; margin-bottom: 1.4rem;
  }
  .cond-bar .on { color: #8b4a2a; }

  /* Typewriter target */
  .prose {
    font-size: clamp(0.98rem, 2.4vw, 1.15rem);
    line-height: 1.9; color: var(--pale); margin-bottom: 1.8rem;
    min-height: 4rem;
  }
  .prose em { color: #9a6a5a; font-style: italic; }
  .bad { color: #c04040; font-style: italic; }
  .low {
    font-size: 0.76em; color: #4a3a28; font-style: italic;
    display: block; margin-top: 0.35rem;
  }

  /* typing cursor */
  .cursor {
    display: inline-block; width: 2px; height: 1em;
    background: var(--pale); vertical-align: middle; margin-left: 2px;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .sep {
    width: 100%; height: 1px;
    background: linear-gradient(to right, transparent, rgba(139,0,0,0.28), transparent);
    margin: 1.4rem 0;
  }

  /* choices hidden until typing ends */
  .choices {
    display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.2rem;
    opacity: 0; transition: opacity 0.8s ease;
  }
  .choices.visible { opacity: 1; }

  .choice {
    background: transparent; border: 1px solid rgba(139,0,0,0.35);
    color: var(--pale); font-family: 'Spectral', serif; font-size: 1.04rem;
    padding: 0.72rem 1.1rem; text-align: left; cursor: pointer; transition: all 0.28s ease;
  }
  .choice::before { content: '› '; color: var(--red); font-size: 1.15em; }
  .choice:hover {
    background: rgba(139,0,0,0.1); border-color: rgba(139,0,0,0.75);
    color: var(--flicker); text-shadow: 0 0 10px rgba(200,150,80,0.35);
    transform: translateX(4px);
  }

  /* ── ENDING ── */
  .ending-wrap { text-align: center; animation: fadein 4s ease forwards; }
  .ending-title {
    font-family: 'Spectral', serif; font-weight: 600;
    font-size: clamp(0.9rem, 2.5vw, 1.25rem); letter-spacing: 0.12em;
    color: var(--red); margin-bottom: 2rem; animation: flicker 3.5s infinite;
  }
  .ending-prose {
    font-size: 1.08rem; line-height: 1.95; color: #7a6a55; font-style: italic;
    margin-bottom: 2.2rem; max-width: 500px; margin-left: auto; margin-right: auto;
  }
  .final-line {
    font-family: 'Share Tech Mono', monospace; font-size: 0.58rem;
    color: #3a2a1a; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2.5rem;
  }

  .btn {
    background: transparent; border: 1px solid rgba(139,0,0,0.45);
    color: var(--pale); font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 0.7rem 2rem; cursor: pointer; transition: all 0.28s;
  }
  .btn:hover { background: rgba(139,0,0,0.18); border-color: var(--red); color: var(--flicker); }

  /* ── SKIP BUTTON ── */
  #skip-btn {
    position: fixed; bottom: 3rem; left: 50%; transform: translateX(-50%);
    z-index: 30; background: transparent; border: none;
    font-family: 'Share Tech Mono', monospace; font-size: 0.5rem;
    color: #2a1a0a; letter-spacing: 0.2em; cursor: pointer;
    opacity: 0; transition: opacity 0.5s;
  }
  #skip-btn.show { opacity: 1; }
  #skip-btn:hover { color: #5a3a2a; }

  /* ── KEYFRAMES ── */
  @keyframes fadein {
    from { opacity: 0; transform: translateY(7px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes flicker {
    0%,94%,100%{opacity:1} 95%{opacity:0.35} 96%{opacity:0.85} 97%{opacity:0.15} 98%{opacity:0.9}
  }
  .bleed { animation: bleed 3.2s ease-in-out infinite; }
  @keyframes bleed {
    0%  { text-shadow: 0 0 5px rgba(139,0,0,0.5); }
    50% { text-shadow: 0 0 22px rgba(139,0,0,0.95), 2px 0 9px rgba(139,0,0,0.6); }
    100%{ text-shadow: 0 0 5px rgba(139,0,0,0.5); }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="noise"></canvas>
<div id="flash"></div>
<div id="static-burst"></div>

<div id="hud"><div id="hud-day">ДЕНЬ —</div><div id="hud-loc">—</div></div>
<div id="save-indicator">▪ СИГНАЛ СОХРАНЁН</div>
<div id="deaths-log"></div>
<button id="sound-btn" onclick="toggleSound()">♪ ЗВУК: ВКЛ</button>
<button id="skip-btn" onclick="skipTyping()">[ ПРОПУСТИТЬ ]</button>

<div id="game"><div id="screen"></div></div>

<script>
// ══════════════════════════════════════════════════════
//  NOISE CANVAS
// ══════════════════════════════════════════════════════
(function(){
  var c=document.getElementById('noise'), x=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  function draw(){
    var img=x.createImageData(c.width,c.height);
    for(var i=0;i<img.data.length;i+=4){var v=Math.random()*255|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=6;}
    x.putImageData(img,0,0);
    setTimeout(function(){requestAnimationFrame(draw);},90);
  }
  draw();
})();

// ══════════════════════════════════════════════════════
//  BACKGROUND ILLUSTRATIONS (SVG drawn to canvas per scene)
// ══════════════════════════════════════════════════════
var BG = {
  canvas: document.getElementById('bg-canvas'),
  ctx: null,
  current: null,

  init: function(){
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.ctx = this.canvas.getContext('2d');
  },

  clear: function(){
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
    this.canvas.classList.remove('show');
  },

  draw: function(type){
    if(type === this.current) return;
    this.current = type;
    var W=this.canvas.width, H=this.canvas.height, ctx=this.ctx;
    ctx.clearRect(0,0,W,H);
    this.canvas.classList.add('show');

    if(type==='tower') this._drawTower(ctx,W,H);
    else if(type==='window') this._drawWindow(ctx,W,H);
    else if(type==='corridor') this._drawCorridor(ctx,W,H);
    else if(type==='south') this._drawSouth(ctx,W,H);
    else if(type==='forest') this._drawForest(ctx,W,H);
    else if(type==='bunker') this._drawBunker(ctx,W,H);
    else if(type==='lab') this._drawLab(ctx,W,H);
    else if(type==='hospital') this._drawHospital(ctx,W,H);
    else if(type==='void') this._drawVoid(ctx,W,H);
    else if(type==='apartment_inside') this._drawApartmentInside(ctx,W,H);
  },

  _drawTower: function(ctx,W,H){
    // Sick sky
    var sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'rgba(30,10,5,0.85)');
    sky.addColorStop(0.6,'rgba(60,20,10,0.6)');
    sky.addColorStop(1,'rgba(5,5,5,0.9)');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
    // Tower silhouette
    var cx=W/2;
    ctx.fillStyle='rgba(5,3,3,0.95)';
    ctx.beginPath();
    ctx.moveTo(cx-60,H); ctx.lineTo(cx-45,H*0.6);
    ctx.lineTo(cx-25,H*0.3); ctx.lineTo(cx-8,H*0.08);
    ctx.lineTo(cx,H*0.02); ctx.lineTo(cx+8,H*0.08);
    ctx.lineTo(cx+25,H*0.3); ctx.lineTo(cx+45,H*0.6);
    ctx.lineTo(cx+60,H); ctx.closePath(); ctx.fill();
    // Tower glow
    var glow=ctx.createRadialGradient(cx,H*0.05,0,cx,H*0.05,120);
    glow.addColorStop(0,'rgba(180,60,20,0.25)');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);
    // Small windows on tower
    ctx.fillStyle='rgba(180,80,20,0.6)';
    [[cx-15,H*0.45],[cx+15,H*0.45],[cx-10,H*0.35],[cx+10,H*0.35],[cx,H*0.25]].forEach(function(p){
      ctx.fillRect(p[0]-3,p[1]-4,6,8);
    });
    // Ground silhouette of people
    ctx.fillStyle='rgba(8,4,4,0.9)';
    for(var i=0;i<18;i++){
      var px=W*0.15+i*(W*0.7/18), py=H*0.88;
      ctx.beginPath();
      ctx.arc(px,py-14,5,0,Math.PI*2); ctx.fill();
      ctx.fillRect(px-3,py-9,6,18);
    }
  },

  _drawWindow: function(ctx,W,H){
    ctx.fillStyle='rgba(8,5,5,0.9)'; ctx.fillRect(0,0,W,H);
    // window frame
    var wx=W/2-120, wy=H/2-160, ww=240, wh=280;
    ctx.strokeStyle='rgba(60,40,30,0.8)'; ctx.lineWidth=12;
    ctx.strokeRect(wx,wy,ww,wh);
    // sky through window
    var innerSky=ctx.createLinearGradient(wx,wy,wx,wy+wh);
    innerSky.addColorStop(0,'rgba(50,15,5,0.7)');
    innerSky.addColorStop(1,'rgba(20,8,3,0.8)');
    ctx.fillStyle=innerSky; ctx.fillRect(wx+6,wy+6,ww-12,wh-12);
    // cross-frame
    ctx.strokeStyle='rgba(60,40,30,0.8)'; ctx.lineWidth=8;
    ctx.beginPath(); ctx.moveTo(W/2,wy); ctx.lineTo(W/2,wy+wh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx,H/2-20); ctx.lineTo(wx+ww,H/2-20); ctx.stroke();
    // figures in window
    ctx.fillStyle='rgba(3,2,2,0.95)';
    [W/2-50,W/2,W/2+50].forEach(function(px){
      ctx.beginPath(); ctx.arc(px,H/2+50,6,0,Math.PI*2); ctx.fill();
      ctx.fillRect(px-4,H/2+56,8,20);
    });
  },

  _drawCorridor: function(ctx,W,H){
    ctx.fillStyle='rgba(5,4,4,0.95)'; ctx.fillRect(0,0,W,H);
    // Perspective corridor
    var vx=W/2, vy=H*0.45;
    ctx.strokeStyle='rgba(40,25,15,0.6)'; ctx.lineWidth=1.5;
    // Walls
    ctx.fillStyle='rgba(12,8,6,0.9)';
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.lineTo(W,0); ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
    // Floor lines to vanishing point
    for(var i=0;i<=8;i++){
      var fx=i*(W/8);
      ctx.beginPath(); ctx.moveTo(fx,H); ctx.lineTo(vx,vy); ctx.stroke();
    }
    // Ceiling lines
    for(var j=0;j<=8;j++){
      var cx2=j*(W/8);
      ctx.beginPath(); ctx.moveTo(cx2,0); ctx.lineTo(vx,vy); ctx.stroke();
    }
    // Doors on sides (receding)
    ctx.strokeStyle='rgba(50,30,20,0.5)'; ctx.lineWidth=1;
    [[W*0.1,H*0.2,W*0.22,H*0.8],[W*0.78,H*0.2,W*0.9,H*0.8]].forEach(function(d){
      ctx.strokeRect(d[0],d[1],d[2]-d[0],d[3]-d[1]);
    });
    [[W*0.3,H*0.3,W*0.38,H*0.7],[W*0.62,H*0.3,W*0.7,H*0.7]].forEach(function(d){
      ctx.strokeRect(d[0],d[1],d[2]-d[0],d[3]-d[1]);
    });
    // Figure at end
    ctx.fillStyle='rgba(2,1,1,1)';
    ctx.beginPath(); ctx.arc(vx,vy-18,8,0,Math.PI*2); ctx.fill();
    ctx.fillRect(vx-5,vy-10,10,22);
    // Flickering light
    var lg=ctx.createRadialGradient(vx,vy,0,vx,vy,200);
    lg.addColorStop(0,'rgba(80,50,20,0.15)');
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg; ctx.fillRect(0,0,W,H);
  },

  _drawSouth: function(ctx,W,H){
    ctx.fillStyle='rgba(5,4,3,0.92)'; ctx.fillRect(0,0,W,H);
    // Wrong-color sky gradient
    var sky=ctx.createLinearGradient(0,0,0,H*0.6);
    sky.addColorStop(0,'rgba(35,18,8,0.85)');
    sky.addColorStop(1,'rgba(15,8,5,0.7)');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.6);
    // Road perspective
    ctx.fillStyle='rgba(10,8,6,0.9)';
    ctx.beginPath();
    ctx.moveTo(W*0.35,H); ctx.lineTo(W*0.48,H*0.55);
    ctx.lineTo(W*0.52,H*0.55); ctx.lineTo(W*0.65,H); ctx.closePath(); ctx.fill();
    // Road disappears into void
    var rg=ctx.createLinearGradient(W/2,H*0.55,W/2,H*0.65);
    rg.addColorStop(0,'rgba(35,18,8,0.6)');
    rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg; ctx.fillRect(W*0.45,H*0.5,W*0.1,H*0.15);
    // Edge — the void
    var vg=ctx.createLinearGradient(0,H*0.52,0,H*0.62);
    vg.addColorStop(0,'rgba(50,20,10,0.5)');
    vg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=vg; ctx.fillRect(0,H*0.5,W,H*0.12);
    // Attendant silhouette
    ctx.fillStyle='rgba(5,3,3,0.95)';
    ctx.beginPath(); ctx.arc(W*0.75,H*0.72,9,0,Math.PI*2); ctx.fill();
    ctx.fillRect(W*0.75-5,H*0.72+9,10,28);
  },

  _drawForest: function(ctx,W,H){
    ctx.fillStyle='rgba(3,5,3,0.96)'; ctx.fillRect(0,0,W,H);
    // Dead trees
    ctx.strokeStyle='rgba(20,15,10,0.9)'; ctx.lineWidth=3;
    var treePositions=[0.05,0.12,0.2,0.28,0.35,0.65,0.72,0.8,0.88,0.95];
    treePositions.forEach(function(tx){
      var x=W*tx, baseY=H, tipY=H*(0.1+Math.random()*0.3);
      ctx.beginPath(); ctx.moveTo(x,baseY); ctx.lineTo(x,tipY); ctx.stroke();
      // branches
      ctx.lineWidth=1.5;
      for(var b=0;b<4;b++){
        var by=tipY+(baseY-tipY)*(0.2+b*0.18);
        var bl=30+b*15, ba=(Math.random()-0.5)*0.8;
        ctx.beginPath(); ctx.moveTo(x,by);
        ctx.lineTo(x+Math.cos(ba)*bl,by-Math.sin(Math.abs(ba))*bl/2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,by);
        ctx.lineTo(x-Math.cos(ba)*bl,by-Math.sin(Math.abs(ba))*bl/2); ctx.stroke();
      }
      ctx.lineWidth=3;
    });
    // Fog
    var fog=ctx.createLinearGradient(0,H*0.5,0,H);
    fog.addColorStop(0,'rgba(0,0,0,0)');
    fog.addColorStop(1,'rgba(15,12,10,0.7)');
    ctx.fillStyle=fog; ctx.fillRect(0,0,W,H);
    // Eyes in the dark
    [[W*0.15,H*0.4],[W*0.45,H*0.35],[W*0.82,H*0.42]].forEach(function(e){
      ctx.fillStyle='rgba(120,30,10,0.5)';
      ctx.beginPath(); ctx.ellipse(e[0]-6,e[1],4,2,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(e[0]+6,e[1],4,2,0,0,Math.PI*2); ctx.fill();
    });
  },

  _drawBunker: function(ctx,W,H){
    ctx.fillStyle='rgba(4,4,5,0.97)'; ctx.fillRect(0,0,W,H);
    // Concrete walls - rough texture
    ctx.fillStyle='rgba(15,13,12,0.9)';
    ctx.fillRect(0,0,W*0.12,H); ctx.fillRect(W*0.88,0,W*0.12,H);
    ctx.fillRect(0,0,W,H*0.08); ctx.fillRect(0,H*0.92,W,H*0.08);
    // Grid of cracks
    ctx.strokeStyle='rgba(30,22,18,0.4)'; ctx.lineWidth=1;
    for(var ci=0;ci<12;ci++){
      ctx.beginPath(); ctx.moveTo(W*0.12+ci*(W*0.76/12),H*0.08);
      ctx.lineTo(W*0.12+ci*(W*0.76/12),H*0.92); ctx.stroke();
    }
    // Central table with papers
    ctx.fillStyle='rgba(18,14,10,0.9)';
    ctx.fillRect(W*0.3,H*0.55,W*0.4,H*0.25);
    ctx.strokeStyle='rgba(40,28,18,0.6)'; ctx.lineWidth=1;
    ctx.strokeRect(W*0.3,H*0.55,W*0.4,H*0.25);
    // Papers on table
    [[W*0.33,H*0.58],[W*0.42,H*0.6],[W*0.55,H*0.57],[W*0.62,H*0.61]].forEach(function(p){

  _drawLab: function(ctx,W,H){

    // Eerie green glow from something

  _drawHospital: function(ctx,W,H){

  _drawVoid: function(ctx,W,H){

// ══════════════════════════════════════════════════════
//  WEB AUDIO — PROCEDURAL AMBIENT HORROR MUSIC
// ══════════════════════════════════════════════════════
var AUDIO = {
  ctx: null, masterGain: null, enabled: true,
  nodes: [], drones: [],

  init: function(){
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.18;
      this.masterGain.connect(this.ctx.destination);
      this._startDrones();
      this._startHeartbeat();
      this._startWhisperNoise();
    }catch(e){ this.enabled=false; }
  },

  _startDrones: function(){
    var self=this, ctx=this.ctx;
    // Three detuned sine waves for an unsettling chord
    var freqs=[36.7, 54.9, 43.7]; // very low, dissonant
    freqs.forEach(function(f,i){
      var osc=ctx.createOscillator();
      var gain=ctx.createGain();
      var filter=ctx.createBiquadFilter();
      osc.type='sine';
      osc.frequency.value=f;
      gain.gain.value=0.3+i*0.05;
      filter.type='lowpass'; filter.frequency.value=200;
      osc.connect(filter); filter.connect(gain); gain.connect(self.masterGain);
      osc.start();
      self.drones.push({osc:osc,gain:gain});
      // Slowly modulate pitch — uneasy
      var lfo=ctx.createOscillator();
      var lfoGain=ctx.createGain();
      lfo.frequency.value=0.03+i*0.01;
      lfoGain.gain.value=0.3;
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      lfo.start();
    });
  },

  _startHeartbeat: function(){
    var self=this, ctx=this.ctx;
    function beat(){
      if(!self.enabled||!self.ctx) return;
      var now=ctx.currentTime;
      var osc=ctx.createOscillator();
      var gain=ctx.createGain();
      osc.type='sine'; osc.frequency.value=55;
      gain.gain.setValueAtTime(0,now);
      gain.gain.linearRampToValueAtTime(0.4,now+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,now+0.3);
      osc.connect(gain); gain.connect(self.masterGain);
      osc.start(now); osc.stop(now+0.35);
      // Second thump (the lub-dub)
      var osc2=ctx.createOscillator();
      var gain2=ctx.createGain();
      osc2.type='sine'; osc2.frequency.value=50;
      gain2.gain.setValueAtTime(0,now+0.18);
      gain2.gain.linearRampToValueAtTime(0.25,now+0.22);
      gain2.gain.exponentialRampToValueAtTime(0.001,now+0.45);
      osc2.connect(gain2); gain2.connect(self.masterGain);
      osc2.start(now+0.18); osc2.stop(now+0.5);
      setTimeout(beat,2800+Math.random()*600);
    }
    setTimeout(beat,1500);
  },

  _startWhisperNoise: function(){
    var self=this, ctx=this.ctx;
    var bufSize=ctx.sampleRate*3;
    var buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<bufSize;i++) data[i]=(Math.random()*2-1)*0.4;
    var source=ctx.createBufferSource();
    source.buffer=buf; source.loop=true;
    var filter=ctx.createBiquadFilter();
    filter.type='bandpass'; filter.frequency.value=2200; filter.Q.value=0.8;
    var gain=ctx.createGain(); gain.gain.value=0.04;
    source.connect(filter); filter.connect(gain); gain.connect(self.masterGain);
    source.start();
  },

  playStatic: function(){
    if(!this.enabled||!this.ctx) return;
    var ctx=this.ctx, now=ctx.currentTime;
    var buf=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<data.length;i++) data[i]=Math.random()*2-1;
    var src=ctx.createBufferSource(); src.buffer=buf;
    var gain=ctx.createGain(); gain.gain.value=0.3;
    src.connect(gain); gain.connect(this.ctx.destination);
    src.start();
  },

  playClick: function(){
    if(!this.enabled||!this.ctx) return;
    var ctx=this.ctx, now=ctx.currentTime;
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.type='square'; osc.frequency.value=800+Math.random()*400;
    gain.gain.setValueAtTime(0.06,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.04);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now+0.05);
  },

  intensify: function(){
    if(!this.enabled||!this.masterGain) return;
    this.masterGain.gain.linearRampToValueAtTime(0.32, this.ctx.currentTime+2);
  },
  calm: function(){
    if(!this.enabled||!this.masterGain) return;
    this.masterGain.gain.linearRampToValueAtTime(0.18, this.ctx.currentTime+3);
  },

  toggle: function(){
    this.enabled=!this.enabled;
    if(this.masterGain){
      this.masterGain.gain.value=this.enabled?0.18:0;
    }
    document.getElementById('sound-btn').textContent='♪ ЗВУК: '+(this.enabled?'ВКЛ':'ВЫКЛ');
  }
};

window.toggleSound=function(){ AUDIO.toggle(); };

// ══════════════════════════════════════════════════════
//  TYPEWRITER ENGINE
// ══════════════════════════════════════════════════════
var TW = {
  queue: [], running: false, skipFlag: false, onDone: null,

  type: function(el, html, speed, onDone){
    this.skipFlag=false; this.onDone=onDone||null;
    // Show skip button
    var skipBtn=document.getElementById('skip-btn');
    skipBtn.classList.add('show');
    // Strip HTML tags to get plain text, then re-inject HTML progressively
    // Strategy: build a text node list, type char by char
    var self=this;
    var plainText='';
    var tmp=document.createElement('div'); tmp.innerHTML=html;
    plainText=tmp.textContent||tmp.innerText||'';
    // We'll type the HTML by tracking char position in plain text
    // but render actual HTML spans. Simpler: just type into innerHTML word by word
    var words=html.split(/(?<=\s)/); // split keeping spaces
    var idx=0;
    el.innerHTML='';
    var cursor=document.createElement('span');
    cursor.className='cursor'; el.appendChild(cursor);

    function typeNext(){
      if(self.skipFlag){
        el.innerHTML=html;
        skipBtn.classList.remove('show');
        if(self.onDone) self.onDone();
        return;
      }
      if(idx>=words.length){
        // Remove cursor
        var c=el.querySelector('.cursor');
        if(c) c.remove();
        skipBtn.classList.remove('show');
        if(self.onDone) self.onDone();
        return;
      }
      var w=words[idx++];
      var c2=el.querySelector('.cursor');
      if(c2) c2.remove();
      el.innerHTML=el.innerHTML+w;
      cursor=document.createElement('span');
      cursor.className='cursor'; el.appendChild(cursor);
      AUDIO.playClick();
      var delay=speed||(w.trim()===''?80:35+Math.random()*40);
      if(w.includes('<br>')) delay+=120;
      setTimeout(typeNext,delay);
    }
    typeNext();
  }
};

window.skipTyping=function(){
  TW.skipFlag=true;
};

}
function triggerStatic(){
  var el=document.getElementById('static-burst');

}
function setHUD(day,loc){
  document.getElementById('hud-day').textContent=day?'ДЕНЬ '+day:'ДЕНЬ —';
  document.getElementById('hud-loc').textContent=loc||'—';
}
function flashSave(){
  var el=document.getElementById('save-indicator');
  el.classList.add('show'); setTimeout(function(){el.classList.remove('show');},2200);
}
function updateDeathsLog(){
  var d=loadDeaths();

}

function loadSave(){try{var r=localStorage.getItem('tls_ru2_save');return r?JSON.parse(r):null;}catch(e){return null;}}
function writeSave(s){try{localStorage.setItem('tls_ru2_save',JSON.stringify(s));flashSave();}catch(e){}}
function clearSave(){try{localStorage.removeItem('tls_ru2_save');}catch(e){}}
function loadDeaths(){try{var r=localStorage.getItem('tls_ru2_deaths');return r?JSON.parse(r):[];}catch(e){return[];}}
function recordDeath(id){
  var d=loadDeaths();
  if(d.indexOf(id)===-1){d.push(id);try{localStorage.setItem('tls_ru2_deaths',JSON.stringify(d));}catch(e){}}
  updateDeathsLog();
}

var STATE={scene:'title',day:1,flags:{},path:[]};
function flag(k,v){if(v===undefined)return STATE.flags[k];STATE.flags[k]=v;}

//  NAVIGATION
// ══════════════════════════════════════════════════════
window.goTo=function(id,delay){
  triggerStatic();
  setTimeout(function(){
    triggerFlash();
    STATE.scene=id;
    writeSave(STATE);
    render(id);
  },delay||80);
};
window.choose=function(key,next){
  STATE.path.push(key);
  window.goTo(next);
};
window.startGame=function(){
  if(!AUDIO.ctx) AUDIO.init();
  STATE={scene:'scene1',day:1,flags:{},path:[]};
  writeSave(STATE);
  triggerStatic();
  setTimeout(function(){triggerFlash();render('scene1');},120);
};
window.restartGame=function(){
  clearSave();
  STATE={scene:'title',day:1,flags:{},path:[]};
  BG.clear(); BG.current=null;
  AUDIO.calm();
  triggerStatic();
  setTimeout(function(){triggerFlash();render('title');},120);
};

// ══════════════════════════════════════════════════════
//  RENDER WITH TYPEWRITER
// ══════════════════════════════════════════════════════
function render(id){
  var fn=SCENES[id];
  if(!fn){console.error('Сцена не найдена: '+id);return;}
  var html=fn();
  document.getElementById('screen').innerHTML=html;
  updateDeathsLog();
  // Animate prose with typewriter
  var proseEl=document.getElementById('prose-target');
  var proseText=document.getElementById('prose-text');
  var choicesEl=document.getElementById('choices-target');
  if(proseEl&&proseText&&choicesEl){
    var content=proseEl.getAttribute('data-content');
    proseEl.innerHTML='';
    TW.type(proseEl,content,null,function(){
      if(choicesEl) choicesEl.classList.add('visible');
    });
  } else if(choicesEl){
    choicesEl.classList.add('visible');
  }
}

//  INIT
// ══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded',function(){
  BG.init();
  updateDeathsLog();
  setInterval(function(){if(Math.random()<0.10)triggerStatic();},4500);
  setInterval(function(){if(Math.random()<0.04)triggerFlash();},7000);
  var save=loadSave();
  if(save&&save.scene&&save.scene!=='title'&&SCENES[save.scene]){
    STATE=save; render(save.scene);
  } else {
    render('title');
  }
});
</script>
